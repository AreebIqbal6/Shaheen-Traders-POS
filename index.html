  <script>window.onerror = function(msg, src, lineno, colno, error) { document.body.innerHTML = `<div style="background:red;color:white;padding:20px;font-family:sans-serif;z-index:9999;position:absolute;top:0;left:0;width:100%;height:100%;"><h1>Global Error</h1><pre>` + msg + `\n` + (error && error.stack ? error.stack : ``) + `</pre></div>`; }; window.addEventListener("unhandledrejection", function(event) { document.body.innerHTML = `<div style="background:red;color:white;padding:20px;font-family:sans-serif;z-index:9999;position:absolute;top:0;left:0;width:100%;height:100%;"><h1>Unhandled Promise Rejection</h1><pre>` + (event.reason && event.reason.stack ? event.reason.stack : event.reason) + `</pre></div>`; });</script></head>
  <body class="overflow-x-hidden max-w-full m-0 p-0 overscroll-none print:bg-white">
    <div id="root" class="w-full max-w-full overflow-x-hidden flex flex-col min-h-screen print:hidden"></div>
